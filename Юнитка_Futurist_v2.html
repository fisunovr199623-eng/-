const ACQ_PCT=1.5;

function eng(p,c,f,gl,ol,dr){
  const com=p*f/100;const acq=p*ACQ_PCT/100;const ads=p*dr/100;
  const total=c+com+gl+ol+acq+ads;
  const profit=p-total;const margin=p>0?(profit/p)*100:0;
  const fixed=c+gl+ol;const vr=f/100+ACQ_PCT/100+dr/100;
  const minP=vr<1?fixed/(1-vr):99999;
  const optP=(1-vr-.15)>0?fixed/(1-vr-.15):99999;
  return{com,acq,ads,total,profit,margin,minP,optP};
}

function Ed({value,onChange,color,pct}){
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(String(value));
  const ref=useRef(null);
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();ref.current.select()}},[editing]);
  const commit=()=>{const v=parseFloat(draft);if(!isNaN(v)&&v>=0)onChange(v);else setDraft(String(value));setEditing(false)};
  if(editing)return <input ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(String(value));setEditing(false)}}} style={{width:pct?55:70,background:"#1c1917",border:`2px solid ${color}`,borderRadius:4,padding:"2px 5px",fontSize:11,fontFamily:"'Fira Code',monospace",color,fontWeight:700,textAlign:"right",outline:"none"}}/>;
  const display=pct?value.toFixed(1)+"%":"$"+Math.round(value).toLocaleString("ru-RU");
  return <span onClick={()=>{setDraft(pct?String(value):String(Math.round(value)));setEditing(true)}} style={{cursor:"pointer",borderBottom:`1px dashed ${color}44`,padding:"1px 3px",borderRadius:2,fontFamily:"'Fira Code',monospace",fontWeight:600,color,fontSize:11}} title="Нажмите для редакт.">{display}</span>;
}

function MBar({margin}){
  const w=Math.min(Math.max(margin+5,0),80);
  const col=margin>=20?"#059669":margin>=10?"#d97706":margin>0?"#ef4444":"#991b1b";
  return <div style={{display:"flex",alignItems:"center",minWidth:100}}>
    <div style={{flex:1,height:15,background:"#1e293b",borderRadius:3,overflow:"hidden",position:"relative"}}>
      <div style={{width:`${w}%`,height:"100%",background:col,borderRadius:3,transition:"width .3s"}}/>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",fontFamily:"'Fira Code',monospace",textShadow:"0 1px 3px rgba(0,0,0,.8)"}}>{margin.toFixed(1)}%</div>
    </div>
  </div>;
}

function App(){

  const[prices,setPrices]=useState(()=>{const m={};D.forEach((i,idx)=>{m[idx]=i.p});return m});
  const[drrs,setDrrs]=useState(()=>{const m={};D.forEach((i,idx)=>{m[idx]=i.dr});return m});
  const[usdRub,setUsdRub]=useState(82);
  const[search,setSearch]=useState("");
  const[sortKey,setSortKey]=useState("margin");
  const[sortAsc,setSortAsc]=useState(false);
  const[filter,setFilter]=useState("all");
  const[cur,setCur]=useState("USD");

  const k=cur==="RUB"?usdRub:1;const sym=cur==="RUB"?"₽":"$";

  const rows=useMemo(()=>{
    let arr=D.map((item,idx)=>{
      const cost=costs[idx]??item.c;const price=prices[idx]??item.p;const drr=drrs[idx]??item.dr;
      const e=eng(price,cost,item.f,item.gl,item.ol,drr);
      return{...item,idx,cost,price,drr,...e,costCh:Math.abs(cost-item.c)>.5,priceCh:Math.abs(price-item.p)>.5,drrCh:Math.abs(drr-item.dr)>.05};
    });
    if(search){const q=search.toLowerCase();arr=arr.filter(r=>r.s.toLowerCase().includes(q)||r.n.toLowerCase().includes(q))}
    if(filter==="good")arr=arr.filter(r=>r.margin>=20);
    else if(filter==="mid")arr=arr.filter(r=>r.margin>=10&&r.margin<20);
    else if(filter==="bad")arr=arr.filter(r=>r.margin<10);
    else if(filter==="scenario")arr=arr.filter(r=>r.sc);
    arr.sort((a,b)=>{const key=sortKey;if(key==="name")return sortAsc?a.s.localeCompare(b.s):b.s.localeCompare(a.s);const va=key==="price"?a.price:key==="cost"?a.cost:key==="margin"?a.margin:key==="profit"?a.profit:key==="drr"?a.drr:a.profit;const vb=key==="price"?b.price:key==="cost"?b.cost:key==="margin"?b.margin:key==="profit"?b.profit:key==="drr"?b.drr:b.profit;return sortAsc?va-vb:vb-va});
    return arr;
  },[costs,prices,drrs,search,filter,sortKey,sortAsc,usdRub]);

  const all=D.map((item,idx)=>eng(prices[idx]??item.p,costs[idx]??item.c,item.f,item.gl,item.ol,drrs[idx]??item.dr));
  const avgMargin=all.length?all.reduce((s,r)=>s+r.margin,0)/all.length:0;
  const good=all.filter(r=>r.margin>=20).length;
  const mid2=all.filter(r=>r.margin>=10&&r.margin<20).length;
  const bad=all.filter(r=>r.margin<10).length;
  const edited=rows.filter(r=>r.costCh||r.priceCh||r.drrCh).length;

  const handleSort=k2=>{if(sortKey===k2)setSortAsc(!sortAsc);else{setSortKey(k2);setSortAsc(false)}};
  const resetAll=()=>{const cm={},pm={},dm={};D.forEach((i,idx)=>{cm[idx]=i.c;pm[idx]=i.p;dm[idx]=i.dr});setCosts(cm);setPrices(pm);setDrrs(dm)};

  const th=(key,minW,align)=>({padding:"7px 4px",textAlign:align||"right",fontSize:9,color:sortKey===key?"#f1f5f9":"#64748b",fontWeight:700,borderBottom:sortKey===key?"2px solid #818cf8":"2px solid #1e293b",cursor:"pointer",userSelect:"none",position:"sticky",top:0,background:"#0b0f1a",zIndex:2,letterSpacing:.3,textTransform:"uppercase",whiteSpace:"nowrap",minWidth:minW||"auto"});

  return <div style={{minHeight:"100vh",background:"#060811",color:"#e2e8f0",fontFamily:"'Outfit',sans-serif",padding:"16px 12px"}}>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <div style={{maxWidth:1450,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:3}}>
        <h1 style={{fontSize:22,fontWeight:800,margin:0,background:"linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ЮНИТ-ЭКОНОМИКА FUTURIST v2</h1>
        <span style={{fontSize:11,color:"#475569"}}>Ozon Global · ОАЭ→РФ · {D.length} позиций</span>
      </div>
      <p style={{color:"#64748b",margin:"0 0 10px",fontSize:11}}>
        ✱ Обновлённые закупки · ✏️ Нажмите на <span style={{color:"#fbbf24"}}>себест.</span> / <span style={{color:"#60a5fa"}}>цену</span> / <span style={{color:"#f472b6"}}>ДРР%</span> — пересчёт мгновенный · Логистика: GBS Express ОАЭ→РФ + Ozon до ПВЗ · Эквайринг {ACQ_PCT}%
      </p>

      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"end"}}>
        <div style={{background:"#111827",borderRadius:7,padding:"5px 8px"}}>
          <div style={{fontSize:8,color:"#475569",textTransform:"uppercase"}}>USD/RUB</div>
          <input type="number" value={usdRub} onChange={e=>setUsdRub(+e.target.value||82)} style={{width:65,background:"#0a0e1a",border:"1px solid #1e293b",borderRadius:5,padding:"3px 6px",color:"#60a5fa",fontSize:14,fontWeight:700,fontFamily:"Fira Code",outline:"none"}}/>
        </div>
        <div style={{display:"flex",gap:2}}>
          {["USD","RUB"].map(c=><button key={c} onClick={()=>setCur(c)} style={{padding:"7px 14px",borderRadius:6,border:"none",background:cur===c?"#3b82f6":"#111827",color:cur===c?"#fff":"#475569",fontWeight:700,fontSize:12,cursor:"pointer"}}>{c==="RUB"?"₽ RUB":"$ USD"}</button>)}
        </div>
        <input placeholder="🔍 Поиск..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:"#111827",border:"1px solid #1e293b",borderRadius:6,padding:"7px 10px",color:"#e2e8f0",fontSize:11,width:180,outline:"none"}}/>
        <div style={{display:"flex",gap:2}}>
          {[["all",`Все`,"#64748b"],["good",`★${good}`,"#059669"],["mid",`◆${mid2}`,"#d97706"],["bad",`✕${bad}`,"#ef4444"],["scenario","⚠️","#f59e0b"]].map(([v,l,bg])=>
            <button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 8px",borderRadius:5,border:filter===v?`1px solid ${bg}`:"1px solid transparent",background:filter===v?bg+"18":"#111827",color:filter===v?bg:"#475569",fontSize:10,fontWeight:600,cursor:"pointer"}}>{l}</button>
          )}
        </div>
        {edited>0&&<button onClick={resetAll} style={{padding:"5px 10px",borderRadius:5,border:"1px solid #f59e0b33",background:"#f59e0b11",color:"#f59e0b",fontSize:10,fontWeight:600,cursor:"pointer"}}>↺ Сброс ({edited})</button>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        {[["Ø Маржа",avgMargin.toFixed(1)+"%","все позиции",avgMargin>=15?"#10b981":"#f59e0b"],["★ Маржа ≥20%",good+" товаров",`${(good/D.length*100).toFixed(0)}%`,"#10b981"],["◆ Маржа 10-20%",mid2+" товаров","норма","#d97706"],["✕ Маржа <10%",bad+" товаров","внимание",bad>10?"#ef4444":"#f59e0b"]].map(([t,v,s,c],i)=>
          <div key={i} style={{background:c+"08",border:`1px solid ${c}22`,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:8,color:"#64748b",textTransform:"uppercase",letterSpacing:.5}}>{t}</div>
            <div style={{fontSize:18,fontWeight:800,color:c,fontFamily:"Fira Code",margin:"2px 0"}}>{v}</div>
            <div style={{fontSize:9,color:"#475569"}}>{s}</div>
          </div>
        )}
      </div>

      <div style={{background:"#0b0f1a",borderRadius:8,border:"1px solid #1e293b",overflow:"auto",maxHeight:"68vh"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th onClick={()=>handleSort("name")} style={{...th("name",170,"left")}}>Артикул</th>
            <th onClick={()=>handleSort("price")} style={th("price",70)}>Цена ✏️</th>
            <th onClick={()=>handleSort("cost")} style={th("cost",70)}>Себест ✏️</th>
            <th style={{...th("",40,"center"),cursor:"default"}}>Ком%</th>
            <th style={{...th("",55,"right"),cursor:"default"}}>GBS ОАЭ</th>
            <th style={{...th("",45,"right"),cursor:"default"}}>До ПВЗ</th>
            <th style={{...th("",45,"right"),cursor:"default"}}>Экв.</th>
            <th onClick={()=>handleSort("drr")} style={th("drr",55,"center")}>ДРР% ✏️</th>
            <th onClick={()=>handleSort("profit")} style={th("profit",75)}>Прибыль</th>
            <th onClick={()=>handleSort("margin")} style={{...th("margin",105,"center")}}>Маржа %</th>
            <th style={{...th("",140,"center"),cursor:"default"}}>Мин → Опт</th>
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>{
              const bg=r.sc?"#1a1200":i%2===0?"#0b0f1a":"#0e1324";
              const rowBg=(r.costCh||r.priceCh||r.drrCh)?"#1a1800":bg;
              const mCol=r.margin>=20?"#059669":r.margin>=10?"#d97706":r.margin>0?"#ef4444":"#991b1b";
              const zone=r.price>=r.optP?"opt":r.price>=r.minP?"mid":"loss";
              const zC={opt:"#059669",mid:"#d97706",loss:"#ef4444"};
              const zL={opt:"≥опт",mid:"≥мин",loss:"<мин"};
              return <tr key={r.idx} style={{background:rowBg,borderLeft:r.sc?"3px solid #f59e0b":"none"}}>
                <td style={{padding:"5px 6px",borderBottom:"1px solid #111827"}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    {(r.costCh||r.priceCh||r.drrCh)&&<span style={{fontSize:7,color:"#f59e0b"}}>●</span>}
                    <div>
                      <div style={{fontWeight:600,fontSize:11,color:r.sc?"#f59e0b":"#f1f5f9"}}>{r.s}</div>
                      <div style={{fontSize:9,color:"#475569",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.n}</div>
                    </div>
                  </div>
                </td>
                <td style={{padding:"5px 4px",textAlign:"right",borderBottom:"1px solid #111827"}}>
                  <Ed value={r.price*(cur==="RUB"?1:1)} onChange={v=>setPrices(prev=>({...prev,[r.idx]:v}))} color="#60a5fa"/>
                </td>
                <td style={{padding:"5px 4px",textAlign:"right",borderBottom:"1px solid #111827"}}>
                  <Ed value={r.cost} onChange={v=>setCosts(prev=>({...prev,[r.idx]:v}))} color="#fbbf24"/>
                </td>
                <td style={{padding:"5px 3px",textAlign:"center",borderBottom:"1px solid #111827",fontSize:10,color:"#64748b",fontFamily:"Fira Code"}}>{r.f}%</td>
                <td style={{padding:"5px 3px",textAlign:"right",borderBottom:"1px solid #111827",fontSize:10,color:"#06b6d4",fontFamily:"Fira Code"}}>${r.gl}</td>
                <td style={{padding:"5px 3px",textAlign:"right",borderBottom:"1px solid #111827",fontSize:10,color:"#8b5cf6",fontFamily:"Fira Code"}}>${r.ol.toFixed(1)}</td>
                <td style={{padding:"5px 3px",textAlign:"right",borderBottom:"1px solid #111827",fontSize:10,color:"#64748b",fontFamily:"Fira Code"}}>${r.acq.toFixed(1)}</td>
                <td style={{padding:"5px 3px",textAlign:"center",borderBottom:"1px solid #111827"}}>
                  <Ed value={r.drr} onChange={v=>setDrrs(prev=>({...prev,[r.idx]:v}))} color="#f472b6" pct/>
                </td>
                <td style={{padding:"5px 4px",textAlign:"right",borderBottom:"1px solid #111827",fontFamily:"Fira Code",fontWeight:700,fontSize:11,color:mCol}}>
                  {sym}{Math.round(r.profit*k).toLocaleString("ru-RU")}
                </td>
                <td style={{padding:"5px 4px",borderBottom:"1px solid #111827"}}><MBar margin={r.margin}/></td>
                <td style={{padding:"5px 4px",borderBottom:"1px solid #111827"}}>
                  <div style={{display:"flex",gap:5,alignItems:"center",fontSize:10,fontFamily:"Fira Code"}}>
                    <span style={{color:"#ef4444"}} title="Мин (0%)">{sym}{Math.round(r.minP*k).toLocaleString("ru-RU")}</span>
                    <span style={{color:"#334155"}}>→</span>
                    <span style={{color:"#10b981"}} title="Опт (15%)">{sym}{Math.round(r.optP*k).toLocaleString("ru-RU")}</span>
                    <span style={{fontSize:8,padding:"1px 4px",borderRadius:6,background:zC[zone]+"22",color:zC[zone],fontWeight:700}}>{zL[zone]}</span>
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>

      <div style={{marginTop:8,padding:"7px 12px",background:"#111827",borderRadius:7,fontSize:9,color:"#475569",lineHeight:1.8}}>
        <span style={{color:"#94a3b8",fontWeight:600}}>Расчёт:</span> Расходы = Себест. + Комиссия(%) + <span style={{color:"#06b6d4"}}>GBS ОАЭ→РФ</span> + <span style={{color:"#8b5cf6"}}>Ozon до ПВЗ</span> + Эквайринг({ACQ_PCT}%) + Реклама(ДРР%) ·
        <span style={{color:"#ef4444"}}> Мин</span> = 0% маржи · <span style={{color:"#10b981"}}> Опт</span> = 15% маржи ·
        GBS Express: &lt;0.5кг=$10 | 0.5-1кг=$15 | 1-2кг=$25 | 2-5кг=$45 | 5-10кг=$65 | 10кг+=$80 ·
        ✱ = обновлённая закупка · ⚠ = сценарий с упавшей ценой
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
